name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
  IMAGE_NAME: ${{ vars.FRONTEND_IMAGE_NAME }}
  FALLBACK_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://alloydb-crud-api-dmkxnmuy3q-ue.a.run.app' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Resolve API base URL
        run: |
          set -euo pipefail

          api_url=""
          for service in "${{ vars.API_CLOUD_RUN_SERVICE || 'cloudsql-crud-api' }}" alloydb-crud-api; do
            if [ -z "$service" ]; then
              continue
            fi

            candidate="$(gcloud run services describe "$service" \
              --project "$PROJECT_ID" \
              --region "$REGION" \
              --format "value(status.url)" 2>/dev/null || true)"

            if [ -n "$candidate" ]; then
              api_url="$candidate"
              break
            fi
          done

          if [ -z "$api_url" ]; then
            api_url="${FALLBACK_API_BASE_URL%/}"
          fi

          echo "VITE_API_BASE_URL=$api_url" >> "$GITHUB_ENV"
          echo "Using API base URL: $api_url"

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build \
            --build-arg VITE_API_BASE_URL="$VITE_API_BASE_URL" \
            --tag "$image" .
          docker push "$image"
          echo "IMAGE=$image" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run service
        run: |
          set -euo pipefail
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "$IMAGE" \
            --service-account "$CLOUD_RUN_SERVICE_ACCOUNT" \
            --allow-unauthenticated

      - name: Show service URL
        run: |
          gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format "value(status.url)"
